<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA 6 - Three.js Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        #gameCanvas {
            display: block;
        }
        
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        .hud-element {
            position: absolute;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            border: 3px solid #ff0000;
            background: rgba(0,0,0,0.7);
            border-radius: 10px;
        }
        
        #speedometer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
        }
        
        #mission {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 18px;
            color: #ffff00;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            text-align: center;
        }
        
        .controls {
            position: absolute;
            bottom: 250px;
            left: 20px;
            color: white;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">
        <div id="loading">Loading GTA 6...</div>
        <div id="minimap">
            <canvas id="minimapCanvas" width="200" height="200"></canvas>
        </div>
        <div id="speedometer" class="hud-element">0 mph</div>
        <div id="mission" class="hud-element">Welcome to Vice City</div>
        <div class="controls">
            <div>WASD - Move/Drive</div>
            <div>Shift - Run</div>
            <div>Space - Brake/Jump</div>
            <div>Mouse - Look Around/Shoot</div>
            <div>E - Enter/Exit Vehicle</div>
            <div>1-6 - Switch Weapons</div>
            <div>M - Add Money (Cheat)</div>
            <div>P - Increase Wanted Level</div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
